<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background gradient - lighter for maskable safe zone -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="75%">
      <stop offset="0%" stop-color="#2A1A10"/>
      <stop offset="100%" stop-color="#0A0502"/>
    </radialGradient>
    
    <!-- Stone gradient -->
    <radialGradient id="stoneGrad" cx="30%" cy="30%" r="80%">
      <stop offset="0%" stop-color="#E8D5A0"/>
      <stop offset="40%" stop-color="#C8782A"/>
      <stop offset="100%" stop-color="#3A1A05"/>
    </radialGradient>
    
    <!-- Gold gradient -->
    <radialGradient id="goldGrad" cx="30%" cy="30%" r="80%">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="50%" stop-color="#DAA520"/>
      <stop offset="100%" stop-color="#8B6508"/>
    </radialGradient>
    
    <!-- Glow effect -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="10" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Shadow -->
    <filter id="shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="10" stdDeviation="16" flood-opacity="0.5"/>
    </filter>
  </defs>
  
  <!-- Background with padding for maskable safe zone -->
  <rect width="512" height="512" rx="100" fill="url(#bgGrad)"/>
  
  <!-- Decorative border rings -->
  <circle cx="256" cy="256" r="245" fill="none" stroke="#C8782A" stroke-width="4" opacity="0.25"/>
  <circle cx="256" cy="256" r="225" fill="none" stroke="#FFD700" stroke-width="2" opacity="0.15"/>
  <circle cx="256" cy="256" r="205" fill="none" stroke="#C8782A" stroke-width="1" opacity="0.1"/>
  
  <!-- Ground/earth base -->
  <ellipse cx="256" cy="430" rx="200" ry="50" fill="#1A0E05" opacity="0.4"/>
  
  <!-- Small stones scattered (showing game elements) -->
  <ellipse cx="180" cy="290" rx="20" ry="15" fill="url(#stoneGrad)" filter="url(#shadow)" opacity="0.75"/>
  <ellipse cx="230" cy="305" rx="18" ry="14" fill="url(#stoneGrad)" filter="url(#shadow)" opacity="0.75"/>
  <ellipse cx="280" cy="300" rx="19" ry="14" fill="url(#stoneGrad)" filter="url(#shadow)" opacity="0.75"/>
  <ellipse cx="330" cy="295" rx="17" ry="13" fill="url(#stoneGrad)" filter="url(#shadow)" opacity="0.7"/>
  <ellipse cx="205" cy="330" rx="16" ry="12" fill="url(#stoneGrad)" filter="url(#shadow)" opacity="0.65"/>
  <ellipse cx="255" cy="340" rx="17" ry="13" fill="url(#stoneGrad)" filter="url(#shadow)" opacity="0.65"/>
  <ellipse cx="305" cy="335" rx="16" ry="12" fill="url(#stoneGrad)" filter="url(#shadow)" opacity="0.65"/>
  
  <!-- Stone highlight accents -->
  <ellipse cx="175" cy="285" rx="7" ry="4" fill="rgba(255,255,255,0.3)" transform="rotate(-20 175 285)"/>
  <ellipse cx="225" cy="300" rx="6" ry="3" fill="rgba(255,255,255,0.3)" transform="rotate(-20 225 300)"/>
  <ellipse cx="275" cy="295" rx="6" ry="3" fill="rgba(255,255,255,0.3)" transform="rotate(-20 275 295)"/>
  
  <!-- Main Ghoen (golden throwing stone) - LARGE CENTER -->
  <circle cx="256" cy="220" r="90" fill="url(#goldGrad)" filter="url(#glow), url(#shadow)"/>
  
  <!-- Ghoen premium highlights -->
  <ellipse cx="225" cy="190" rx="30" ry="18" fill="rgba(255,255,255,0.45)" transform="rotate(-25 225 190)"/>
  <ellipse cx="240" cy="178" rx="15" ry="9" fill="rgba(255,255,255,0.35)" transform="rotate(-25 240 178)"/>
  <ellipse cx="250" cy="170" rx="8" ry="5" fill="rgba(255,255,255,0.25)" transform="rotate(-25 250 170)"/>
  
  <!-- Ghoen rim accent -->
  <circle cx="256" cy="220" r="88" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="2"/>
  
  <!-- Motion/sparkle effects -->
  <path d="M 256 105 Q 256 125 256 145" stroke="#FFD700" stroke-width="5" stroke-linecap="round" opacity="0.7" fill="none"/>
  <path d="M 233 112 Q 233 132 233 145" stroke="#FFD700" stroke-width="3" stroke-linecap="round" opacity="0.5" fill="none"/>
  <path d="M 279 112 Q 279 132 279 145" stroke="#FFD700" stroke-width="3" stroke-linecap="round" opacity="0.5" fill="none"/>
  
  <!-- Premium sparkles -->
  <g stroke="#FFD700" stroke-width="3" stroke-linecap="round" opacity="0.9">
    <path d="M 340 185 L 355 185 M 347.5 177.5 L 347.5 192.5"/>
    <path d="M 170 250 L 185 250 M 177.5 242.5 L 177.5 257.5"/>
    <path d="M 350 290 L 365 290 M 357.5 282.5 L 357.5 297.5"/>
    <path d="M 150 320 L 162 320 M 156 312 L 156 328"/>
  </g>
  
  <!-- Diamond sparkles -->
  <circle cx="360" cy="200" r="4" fill="#FFD700" opacity="0.8"/>
  <circle cx="160" cy="270" r="3" fill="#FFD700" opacity="0.7"/>
  <circle cx="370" cy="310" r="3" fill="#FFD700" opacity="0.6"/>
  <circle cx="140" cy="340" r="2" fill="#FFD700" opacity="0.5"/>
  
  <!-- Traditional African pattern accents (enlarged for visibility) -->
  <g stroke="#C8782A" stroke-width="5" stroke-linecap="round" fill="#C8782A" opacity="0.6">
    <!-- Top-left -->
    <path d="M 70 70 L 120 70 L 70 120" fill="none"/>
    <circle cx="70" cy="70" r="8"/>
    
    <!-- Top-right -->
    <path d="M 442 70 L 392 70 L 442 120" fill="none"/>
    <circle cx="442" cy="70" r="8"/>
    
    <!-- Bottom-left -->
    <path d="M 70 442 L 120 442 L 70 392" fill="none"/>
    <circle cx="70" cy="442" r="8"/>
    
    <!-- Bottom-right -->
    <path d="M 442 442 L 392 442 L 442 392" fill="none"/>
    <circle cx="442" cy="442" r="8"/>
  </g>
  
  <!-- Inner decorative dots -->
  <circle cx="256" cy="60" r="5" fill="#FFD700" opacity="0.5"/>
  <circle cx="256" cy="452" r="5" fill="#FFD700" opacity="0.5"/>
  <circle cx="60" cy="256" r="5" fill="#FFD700" opacity="0.5"/>
  <circle cx="452" cy="256" r="5" fill="#FFD700" opacity="0.5"/>
</svg>
